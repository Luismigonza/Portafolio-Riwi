<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis Miguel | Hub de Proyectos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .hub-title { text-align: center; margin-bottom: 50px; }
        .hub-title h1 { font-size: 3rem; font-weight: 800; }
        .hub-title p { color: #888; font-size: 1.2rem; }
        
        .paths-container { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
        
        .path-card { position: relative; width: 320px; height: 400px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; text-decoration: none; transition: transform 0.4s ease; overflow: hidden; background: #151515; border: 2px solid transparent; }
        .path-card:hover { transform: translateY(-10px); }
        .path-card h2 { font-size: 2rem; margin-bottom: 15px; z-index: 2; }
        .path-card p { font-size: 1rem; color: #ccc; padding: 0 20px; z-index: 2; }
        
        /* Tema Básica (Dorado/Azul) */
        .card-basica { border-color: #d4af37; box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); }
        .card-basica:hover { box-shadow: 0 0 40px rgba(212, 175, 55, 0.4); }
        .card-basica h2 { color: #d4af37; }
        
        /* Tema Avanzada (Morado Visual Studio) */
        .card-avanzada { border-color: #68217a; box-shadow: 0 0 30px rgba(104, 33, 122, 0.1); }
        .card-avanzada:hover { box-shadow: 0 0 40px rgba(104, 33, 122, 0.6); border-color: #00bcd4; }
        .card-avanzada h2 { color: #00bcd4; }

        @media (max-width: 768px) { .paths-container { flex-direction: column; } }
    </style>
</head>
<body>

    <div class="hub-title">
        <h1>Luis Miguel González</h1>
        <p>Selecciona la ruta que deseas explorar</p>
    </div>

    <div class="paths-container">
        <a href="basica.html" class="path-card card-basica">
            <h2>Ruta Básica</h2>
            <p>HTML, CSS, JavaScript y fundamentos en Python.</p>
        </a>

        <a href="avanzada.html" class="path-card card-avanzada">
            <h2>Ruta Avanzada</h2>
            <p>Arquitectura Backend, C#, ASP.NET Core y Bases de Datos.</p>
        </a>
    </div>

</body>
</html>
